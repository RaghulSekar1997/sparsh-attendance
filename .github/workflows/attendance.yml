name: Daily Attendance

on:
  push:
    branches: [main]   # REMOVE this after first successful test
  schedule:
    # 7 PM UK time — BST (summer, UTC+1) = 18:00 UTC
    # In winter (GMT, UTC+0) change to: '0 19 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:   # lets you click "Run workflow" manually from GitHub Actions tab

jobs:
  attendance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser & system deps
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Write config.yml from secret
        run: echo "$CONFIG_YML" > config.yml
        env:
          CONFIG_YML: ${{ secrets.CONFIG_YML }}

      - name: Write Google credentials from secret
        run: echo "$GOOGLE_CREDENTIALS_JSON" > sparsh-attendance-5ee4c1c7e02b.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Run attendance script
        run: python main.py
